<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة كلمة السر الكلاسيكية</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>

<div class="game-container">
    <header>
        <h1>كلمة السر</h1>
        <p id="category-title">الفئة: جاري التحميل...</p>
    </header>

    <main>
        <div id="grid-container" class="grid-container">
        </div>

        <div class="secret-word-section">
            <p id="secret-clue">اللغز: يتم تحديده لاحقاً</p>
            <div id="secret-word-display" class="secret-word-display">
            </div>
        </div>
    </main>

    <footer>
        <ul id="word-list" class="word-list">
        </ul>

        <div class="controls">
            <button id="hint-btn" class="btn">مساعدة 💡</button>
            <button id="new-game-btn" class="btn">لعبة جديدة 🔄</button>
        </div>
    </footer>
</div>

<script src="js/words.js"></script>
<script src="js/game.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
